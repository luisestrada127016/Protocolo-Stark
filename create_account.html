<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>STARK-AIRLINE</title>
        <link rel="stylesheet" href="styles_create_account.css">
    </head>
    <body>
        <header>
            <h1 class="title">STARK-AIRLINE</h1>
            <img src="Stark-logo-no-text.png" alt="Stark-Airline logo" id="logo-no-text" class="logo">
            <form>
                <input type="email" placeholder="Email" required class="email-input">
                <input type="password" placeholder="Password" required class="password-input">
                <input type="password" placeholder="Confirm Password" required class="password-input">
                <label for="save-info">
                    <input type="checkbox" name="save-info" id="save-info">Save my information
                </label>
                <button type="submit">Create Account</button>
            </form>
        </header>
        <footer><p>&copy; 2024 STARK-INDUSTRIES. All rights reserved.</p></footer>
    </body>
</html>
