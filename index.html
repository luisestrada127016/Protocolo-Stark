<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARK-AIRLINE</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="img-loading">
        <img src="img/loading-img.png" alt="jet" class="jet">
    </div>
    <header>
        <img src="img/Stark-logo-standard-background-yellow.png" alt="Stark-Airline standard logo" id="logo-standard" class="logo">
    </header>
    <main>
        <h3>Login</h3>
        <form>
            <!-- Email -->
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Email" required class="email-input">
            <!-- Password -->
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Password" required class="password-input">
            <!-- Botón -->
            <button type="submit" formaction="home.html">Sign In</button>
        </form>
        <!-- Navegación secundaria -->
        <nav>
            <a href="">Forgot password?</a>
            <a href="create_account.html" class="create-account-option">Create account</a>
        </nav>
    </main>
    <footer>
        <p>&copy; 2024 STARK-INDUSTRIES. All rights reserved.</p>
    </footer>
</body>
</html>
